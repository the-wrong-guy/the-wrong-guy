name: Update README with latest Dev.to Posts

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update README with Latest Posts
        run: |
          python3 << 'EOF'
          import requests
          import re
          from datetime import datetime

          # Fetch latest posts from Dev.to
          username = "bhargab"
          url = f"https://dev.to/api/articles?username={username}"
          response = requests.get(url)
          posts = response.json()

          # Build blog content matching current README format
          blog_lines = []
          for i, post in enumerate(posts[:3]):
              title = post['title']
              article_url = post['url']
              date_str = post['published_at'].split('T')[0]

              # Convert YYYY-MM-DD to "MON YYYY" format
              date_obj = datetime.strptime(date_str, '%Y-%m-%d')
              formatted_date = date_obj.strftime('%b %Y').upper()

              # Handle long titles - wrap after colon if present
              blog_lines.append(f"  ▶  [{formatted_date}]  {title}")
              blog_lines.append(f"                 → {article_url}")

              if i < 2:  # Add blank line between posts except after last
                  blog_lines.append("")

          # Create the new content block
          new_block = "```\n" + "\n".join(blog_lines) + "\n```"

          # Read README
          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()

          # Replace the blog section - match from LATEST_DEVTO_POST to the code block end
          pattern = r'(<!-- LATEST_DEVTO_POST -->\n\n)```[\s\S]*?```'
          readme = re.sub(pattern, r'\1' + new_block, readme)

          # Write back
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(readme)

          print("✅ README updated with latest posts")
          for line in blog_lines:
              if line.strip():
                  print(f"   {line}")
          EOF

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git diff README.md)" ]; then
            git add README.md
            git commit -m "🔄 Update README with latest 3 Dev.to posts"
            git push
            echo "✅ Changes pushed successfully"
          else
            echo "ℹ️ No changes to commit"
          fi
